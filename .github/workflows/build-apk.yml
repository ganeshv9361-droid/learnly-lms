name: Build Learnly APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build React app
        working-directory: frontend
        run: npm run build

      - name: Install Capacitor packages
        working-directory: frontend
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Write Capacitor config
        working-directory: frontend
        run: |
          echo '{
            "appId": "com.learnly.app",
            "appName": "Learnly",
            "webDir": "dist",
            "server": {
              "androidScheme": "https",
              "cleartext": true
            },
            "android": {
              "allowMixedContent": true,
              "backgroundColor": "#080810",
              "minSdkVersion": 22
            }
          }' > capacitor.config.json

      - name: Add Android platform
        working-directory: frontend
        run: npx cap add android --no-telemetry

      - name: Sync web assets
        working-directory: frontend
        run: npx cap sync android --no-telemetry

      - name: Make gradlew executable
        working-directory: frontend/android
        run: chmod +x gradlew

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Learnly-APK
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30